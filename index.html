<script>
  /* Inline the official pawaIconZ sprite so #pIcon-* refs resolve in-document. */
  window.__spriteReady = fetch("app/sprite.svg?v=5")
    .then(function (r) { return r.text(); })
    .then(function (t) { document.getElementById("sprite-host").innerHTML = t; })
    .catch(function (e) { console.warn("sprite load failed", e); });
</script>
